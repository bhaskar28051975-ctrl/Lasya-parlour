<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lasya Terminal - Employee View</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-neutral-100 font-sans pb-12">

    <header class="bg-neutral-950 p-4 border-b border-neutral-800 flex justify-between items-center">
        <div>
            <h1 class="text-xs font-black text-pink-500 uppercase">Lasya Employee Portal</h1>
            <p id="active-user-banner" class="text-[11px] text-neutral-400 font-bold">Please log in</p>
        </div>
        <select id="staff-login-select" class="bg-neutral-800 text-white border border-neutral-700 text-xs font-bold p-1.5 rounded-xl outline-none">
            <option value="">Choose Login Name</option>
        </select>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <div id="tracking-control-box" class="hidden bg-neutral-800 p-3 rounded-2xl border border-neutral-700 flex items-center justify-between">
            <div>
                <p class="text-xs font-bold">Live GPS Location Transmitter</p>
                <p id="tracking-status-text" class="text-[10px] text-neutral-400 font-medium">Status: Inactive</p>
            </div>
            <button id="toggle-location-btn" onclick="toggleLocationTracking()" class="bg-red-600 hover:bg-red-700 text-white font-bold text-[11px] px-4 py-2 rounded-xl uppercase tracking-wider transition">
                Start Tracking 📡
            </button>
        </div>
        
        <h2 class="text-xs font-black uppercase text-neutral-400 tracking-wider">My Assigned Task Pipeline</h2>
        <div id="agent-jobs-container" class="space-y-4"></div>
    </main>

    <div id="payment-modal" class="fixed inset-0 bg-black/95 z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center text-neutral-900">
            <h3 class="font-black text-base text-purple-900 uppercase">Collect Split Payment</h3>
            <div class="bg-neutral-100 p-3 rounded-2xl inline-block my-3">
                <img id="qr-box-img" src="" class="w-44 h-44 mx-auto object-contain">
            </div>
            <div class="bg-purple-50 p-3 rounded-xl text-left text-xs font-bold space-y-1 text-purple-950 mb-4">
                <div class="flex justify-between"><span>Total Bill Amount:</span><span id="p-total">₹0</span></div>
                <div class="flex justify-between text-pink-600"><span>Owner Share (60%):</span><span id="p-owner">₹0</span></div>
                <div class="flex justify-between text-blue-600"><span>Your Commission (40%):</span><span id="p-agent">₹0</span></div>
            </div>
            <button id="confirm-payment-settled" class="w-full bg-green-600 text-white font-black py-3 rounded-xl text-xs uppercase tracking-wider">
                Confirm Cash/UPI Paid & Close ✅
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvBXVAJgqtxC3ErO56qO9Js-fduIlytKM",
            authDomain: "lasya-parlour.firebaseapp.com",
            projectId: "lasya-parlour",
            databaseURL: "https://lasya-parlour-default-rtdb.firebaseio.com",
            storageBucket: "lasya-parlour.firebasestorage.app",
            messagingSenderId: "644324702204",
            appId: "1:644324702204:web:32e0b28a5289e187d62479"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let CURRENT_AGENT = localStorage.getItem('lasya_agent') || "";
        let gpsWatchId = null;
        let isTrackingActive = false;

        // Synchronize drop-down values with registered employees path
        onValue(ref(db, 'lasya_staff'), (snap) => {
            const select = document.getElementById('staff-login-select');
            select.innerHTML = `<option value="">Choose Login Name</option>`;
            snap.forEach(child => {
                select.innerHTML += `<option value="${child.key}">${child.key.toUpperCase()}</option>`;
            });
            if(CURRENT_AGENT) { 
                select.value = CURRENT_AGENT; 
                renderAgentWorkspace(); 
            }
        });

        document.getElementById('staff-login-select').addEventListener('change', (e) => {
            CURRENT_AGENT = e.target.value;
            localStorage.setItem('lasya_agent', CURRENT_AGENT);
            
            // Turn off old background streams immediately on identity shift
            if(gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
            isTrackingActive = false;
            
            renderAgentWorkspace();
        });

        // Track Location Toggle Feature Loop Execution
        window.toggleLocationTracking = () => {
            const btn = document.getElementById('toggle-location-btn');
            const txt = document.getElementById('tracking-status-text');

            if(!isTrackingActive) {
                isTrackingActive = true;
                btn.className = "bg-green-600 hover:bg-green-700 text-white font-bold text-[11px] px-4 py-2 rounded-xl uppercase tracking-wider transition";
                btn.innerText = "Tracking ON 🛰️";
                txt.innerText = "Status: Broadcasting Coordinates...";
                txt.className = "text-[10px] text-green-400 font-bold animate-pulse";

                gpsWatchId = navigator.geolocation.watchPosition((pos) => {
                    update(ref(db, `lasya_locations/${CURRENT_AGENT}`), {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        updatedAt: new Date().toISOString()
                    });
                }, (err) => console.log("Awaiting GPS signal permissions...", err), {
                    enableHighAccuracy: true,
                    maximumAge: 5000
                });
            } else {
                isTrackingActive = false;
                if(gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
                
                btn.className = "bg-red-600 hover:bg-red-700 text-white font-bold text-[11px] px-4 py-2 rounded-xl uppercase tracking-wider transition";
                btn.innerText = "Start Tracking 📡";
                txt.innerText = "Status: Inactive";
                txt.className = "text-[10px] text-neutral-400 font-medium";
            }
        };

        function renderAgentWorkspace() {
            const banner = document.getElementById('active-user-banner');
            const container = document.getElementById('agent-jobs-container');
            const trackBox = document.getElementById('tracking-control-box');
            
            if(!CURRENT_AGENT) {
                banner.innerText = "Please log in";
                trackBox.style.display = 'none';
                container.innerHTML = `<div class="bg-neutral-800 p-6 rounded-2xl text-center text-xs font-bold uppercase text-neutral-500">Authentication Waiting...</div>`;
                return;
            }

            banner.innerText = `Active Session: ${CURRENT_AGENT.toUpperCase()}`;
            trackBox.style.display = 'flex';

            onValue(ref(db, 'lasya_bookings'), (snap) => {
                container.innerHTML = "";
                let hasJob = false;

                snap.forEach((child) => {
                    const bKey = child.key;
                    const bData = child.val();

                    if(bData.assignedAgent === CURRENT_AGENT && bData.status === 'assigned') {
                        hasJob = true;
                        const employeeCommission = Math.round(bData.finalPrice * 0.40);

                        container.innerHTML += `
                            <div class="bg-neutral-800 rounded-2xl p-4 border border-neutral-700 space-y-3 shadow-md">
                                <div class="border-b border-neutral-700 pb-2">
                                    <span class="bg-pink-600 text-white font-black text-[9px] px-2 py-0.5 rounded uppercase tracking-wider">Assigned Task Details</span>
                                    <h3 class="font-black text-sm text-white uppercase mt-1">${bData.serviceName}</h3>
                                </div>
                                <div class="text-xs space-y-2 text-neutral-300">
                                    <p>👩‍🦱 <span class="text-white font-bold">${bData.customerName}</span></p>
                                    <p>📞 <span class="font-mono text-neutral-400">${bData.customerPhone}</span></p>
                                    <p class="text-neutral-300 font-medium bg-neutral-900 p-2 rounded-xl border border-neutral-800">
                                        📍 <strong class="text-white">Address:</strong> ${bData.address || 'No Address Provided'}
                                    </p>
                                    <div class="bg-purple-950/50 p-2.5 rounded-xl border border-purple-900/60 flex justify-between items-center text-[11px]">
                                        <span class="text-purple-300 font-bold uppercase tracking-wider">Your Commission (40%):</span>
                                        <span class="text-amber-400 text-sm font-black">₹${employeeCommission}</span>
                                    </div>
                                </div>
                                <div class="pt-1">
                                    <button onclick="triggerPaymentSplitGate('${bKey}', ${bData.finalPrice})" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold text-xs uppercase tracking-wide py-3 rounded-xl transition shadow-lg">
                                        Service Completed & Collect Money ✓
                                    </button>
                                </div>
                            </div>`;
                    }
                });

                if(!hasJob) {
                    container.innerHTML = `<div class="bg-neutral-800 p-8 rounded-2xl text-center text-xs font-bold uppercase text-neutral-500 tracking-wider">No visits assigned currently</div>`;
                }
            });
        }

        window.triggerPaymentSplitGate = (id, totalAmount) => {
            const ownerPart = Math.round(totalAmount * 0.60);
            const agentPart = totalAmount - ownerPart;

            document.getElementById('p-total').innerText = `₹${totalAmount}`;
            document.getElementById('p-owner').innerText = `₹${ownerPart}`;
            document.getElementById('p-agent').innerText = `₹${agentPart}`;

            const upiString = `upi://pay?pa=lasyaparlour@okaxis&pn=Lasya%20Owner&am=${totalAmount}&cu=INR&tn=Split_${id}`;
            document.getElementById('qr-box-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiString)}`;
            document.getElementById('payment-modal').style.display = 'flex';

            document.getElementById('confirm-payment-settled').onclick = () => {
                // ADDED TIMESTAMPS: Added 'timestamp' update so analytics can capture dates correctly
                update(ref(db, `lasya_bookings/${id}`), { 
                    status: "completed_paid",
                    timestamp: new Date().toISOString()
                }).then(() => {
                    alert("Job finalized and split payment recorded perfectly!");
                    document.getElementById('payment-modal').style.display = 'none';
                });
            };
        };
    </script>
</body>
</html>
