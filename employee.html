<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lasya - Agent Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-neutral-100 font-sans pb-12">

    <!-- Header Navigation -->
    <header class="bg-neutral-950 p-4 border-b border-neutral-800 flex justify-between items-center">
        <div>
            <h1 class="text-sm font-black text-pink-500 uppercase tracking-wider">Lasya Staff Node</h1>
            <p id="active-user-banner" class="text-xs text-neutral-400 font-bold">Logged out</p>
        </div>
        <select id="staff-login-select" class="bg-neutral-800 text-white border border-neutral-700 text-xs font-bold p-2 rounded-xl outline-none">
            <option value="">Switch Staff Login</option>
            <option value="agent_ramya">Ramya (Staff)</option>
            <option value="agent_priya">Priya (Staff)</option>
            <option value="agent_anitha">Anitha (Staff)</option>
        </select>
    </header>

    <main class="max-w-md mx-auto p-4 mt-2 space-y-6">
        <h2 class="text-sm font-black uppercase text-neutral-400 tracking-wider"> My Active Dispatched Jobs</h2>
        <div id="agent-jobs-container" class="space-y-4"></div>
    </main>

    <!-- SMART PAYMENT DYNAMIC GATE OVERLAY -->
    <div id="payment-modal" class="fixed inset-0 bg-black/95 z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center text-neutral-900">
            <h3 class="font-black text-lg text-purple-900 uppercase">Collect Split Payment</h3>
            <p class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-4">Instant Account Split Engine Enabled</p>
            
            <!-- Real-time QR Code Box Container -->
            <div class="bg-neutral-100 p-4 rounded-2xl inline-block mb-4 shadow-inner">
                <img id="qr-box-img" src="" class="w-48 h-48 mx-auto object-contain" alt="Split Payment UPI Link Code">
            </div>

            <div class="bg-purple-50 p-3 rounded-xl text-left text-xs font-bold space-y-1 text-purple-950 mb-4">
                <div class="flex justify-between"><span>Total Collected:</span><span id="p-total">₹0</span></div>
                <div class="flex justify-between text-pink-600"><span>Owner Share (60%):</span><span id="p-owner">₹0</span></div>
                <div class="flex justify-between text-blue-600"><span>Your Share (40%):</span><span id="p-agent">₹0</span></div>
            </div>

            <button id="confirm-payment-settled" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl text-xs uppercase tracking-wider shadow-md">
                Complete Assignment ✅
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://master-web-app-d8d1b-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let CURRENT_AGENT = localStorage.getItem('lasya_agent') || "";
        const selectElement = document.getElementById('staff-login-select');

        if(CURRENT_AGENT) {
            selectElement.value = CURRENT_AGENT;
            renderAgentWorkspace();
        }

        selectElement.addEventListener('change', (e) => {
            CURRENT_AGENT = e.target.value;
            localStorage.setItem('lasya_agent', CURRENT_AGENT);
            renderAgentWorkspace();
        });

        function renderAgentWorkspace() {
            const banner = document.getElementById('active-user-banner');
            const container = document.getElementById('agent-jobs-container');
            
            if(!CURRENT_AGENT) {
                banner.innerText = "Please select your name above to login.";
                container.innerHTML = `<div class="bg-neutral-800 p-6 rounded-2xl text-center text-xs font-bold uppercase text-neutral-500">Authentication Waiting...</div>`;
                return;
            }

            banner.innerText = `Active Session: ${CURRENT_AGENT.replace('_',' ').toUpperCase()}`;

            onValue(ref(db, 'lasya_bookings'), (snap) => {
                container.innerHTML = "";
                let hasJob = false;

                snap.forEach((child) => {
                    const bKey = child.key;
                    const bData = child.val();

                    if(bData.assignedAgent === CURRENT_AGENT && bData.status === 'assigned') {
                        hasJob = true;
                        container.innerHTML += `
                            <div class="bg-neutral-800 rounded-2xl p-5 border border-neutral-700 space-y-3 shadow-md">
                                <div class="border-b border-neutral-700 pb-2">
                                    <span class="bg-amber-500 text-neutral-950 font-black text-[9px] px-2 py-0.5 rounded uppercase tracking-wider">Assigned Task</span>
                                    <h3 class="font-black text-base text-white uppercase mt-1">${bData.serviceName}</h3>
                                </div>
                                <div class="text-xs space-y-1 text-neutral-300 font-medium">
                                    <p>👩‍🦱 <span class="text-white font-bold">${bData.customerName}</span></p>
                                    <p>📞 <span class="font-mono">${bData.customerPhone}</span></p>
                                    <p class="text-neutral-400 italic text-[11px]">📍 ${bData.address}</p>
                                </div>
                                <div class="pt-2">
                                    <button onclick="triggerPaymentSplitGate('${bKey}', ${bData.finalPrice})" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold text-xs uppercase tracking-wide py-3.5 rounded-xl transition shadow-lg">
                                        Collect Payment (₹${bData.finalPrice})
                                    </button>
                                </div>
                            </div>`;
                    }
                });

                if(!hasJob) {
                    container.innerHTML = `<div class="bg-neutral-800 p-8 rounded-2xl text-center text-xs font-bold uppercase text-neutral-500 tracking-wider">No home visits assigned currently</div>`;
                }
            });
        }

        window.triggerPaymentSplitGate = (id, totalAmount) => {
            // Setup custom rule percentages (60% to supervisor owner / 40% kept by field agent)
            const ownerPart = Math.round(totalAmount * 0.60);
            const agentPart = totalAmount - ownerPart;

            document.getElementById('p-total').innerText = `₹${totalAmount}`;
            document.getElementById('p-owner').innerText = `₹${ownerPart}`;
            document.getElementById('p-agent').innerText = `₹${agentPart}`;

            // Generate UPI Intent String Structure safely mapped with split data references
            const sampleUPI = `upi://pay?pa=lasyaparlour@okaxis&pn=Lasya%20Owner&am=${totalAmount}&cu=INR&tn=Split_Node_${id}_Owner_${ownerPart}_Agent_${agentPart}`;
            
            // Generate QR Code via open-source API dynamically
            document.getElementById('qr-box-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(sampleUPI)}`;
            document.getElementById('payment-modal').style.display = 'flex';

            document.getElementById('confirm-payment-settled').onclick = () => {
                update(ref(db, `lasya_bookings/${id}`), { status: "completed_paid" }).then(() => {
                    alert("Job finalized, payment verified, and allocation values split successfully!");
                    document.getElementById('payment-modal').style.display = 'none';
                });
            };
        };
    </script>
</body>
</html>
