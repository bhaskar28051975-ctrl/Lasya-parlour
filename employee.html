<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lasya Terminal - Field Agent View</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-neutral-100 font-sans pb-12">

    <!-- Header Navigation Bar - Enlarged -->
    <header class="bg-neutral-950 p-5 border-b border-neutral-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 class="text-xl font-black text-pink-500 uppercase tracking-wide">Lasya Staff Portal</h1>
            <p id="active-user-banner" class="text-sm text-neutral-400 font-bold mt-1">Session Closed</p>
        </div>
        <select id="staff-login-select" class="w-full sm:w-auto bg-neutral-800 text-white border-2 border-pink-500 text-base font-black p-3 rounded-2xl outline-none shadow-lg">
            <option value="">Choose Login Name</option>
        </select>
    </header>

    <!-- Main Workspace Container - Bigger Texts -->
    <main class="max-w-md mx-auto p-4 space-y-6">
        <div id="gps-status-bar" class="hidden text-center text-xs font-black uppercase p-3 bg-blue-950 rounded-xl text-blue-400 border border-blue-800 tracking-wider">
            📡 Live GPS Tracking Active Engine Online
        </div>
        
        <h2 class="text-lg font-black uppercase text-neutral-400 tracking-wider border-b border-neutral-800 pb-2">Assigned Task Pipeline</h2>
        <div id="agent-jobs-container" class="space-y-4"></div>
    </main>

    <!-- Dynamic Account Division QR Overlay Modal - Enhanced UI -->
    <div id="payment-modal" class="fixed inset-0 bg-black/95 z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center text-neutral-900 shadow-2xl">
            <h3 class="font-black text-xl text-purple-900 uppercase tracking-tight">Collect Split Payment</h3>
            
            <div class="bg-neutral-100 p-4 rounded-2xl inline-block my-4 border">
                <img id="qr-box-img" src="" class="w-52 h-52 mx-auto object-contain" alt="Payment Code">
            </div>
            
            <div class="bg-purple-50 p-4 rounded-2xl text-left text-sm font-black space-y-2 text-purple-950 mb-6 border border-purple-200">
                <div class="flex justify-between text-base border-b pb-1"><span>Total Collected:</span><span id="p-total" class="text-purple-900 font-extrabold">₹0</span></div>
                <div class="flex justify-between text-pink-600 pt-1"><span>Owner Share (60%):</span><span id="p-owner">₹0</span></div>
                <div class="flex justify-between text-blue-600"><span>Your Share (40%):</span><span id="p-agent">₹0</span></div>
            </div>
            
            <button id="confirm-payment-settled" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl text-sm uppercase tracking-wide transition shadow-md">
                Complete Assignment ✅
            </button>
        </div>
    </div>

    <!-- Firebase System Modules Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Corrected Database URL path routing mapping
        const firebaseConfig = {
            apiKey: "AIzaSyAvBXVAJgqtxC3ErO56qO9Js-fduIlytKM",
            authDomain: "lasya-parlour.firebaseapp.com",
            projectId: "lasya-parlour",
            databaseURL: "https://lasya-parlour-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "lasya-parlour.firebasestorage.app",
            messagingSenderId: "644324702204",
            appId: "1:644324702204:web:32e0b28a5289e187d62479"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let CURRENT_AGENT = localStorage.getItem('lasya_agent') || "";
        let gpsWatchId = null;

        // Synchronize drop-down with registered database employees
        onValue(ref(db, 'lasya_staff'), (snap) => {
            const select = document.getElementById('staff-login-select');
            select.innerHTML = `<option value="">Choose Login Name</option>`;
            
            if (snap.exists()) {
                snap.forEach(child => {
                    select.innerHTML += `<option value="${child.key}">${child.key.toUpperCase()}</option>`;
                });
                if(CURRENT_AGENT) { 
                    select.value = CURRENT_AGENT; 
                    renderAgentWorkspace(); 
                    startLocationTracking(); 
                }
            } else {
                select.innerHTML = `<option value="">No Staff Found in Admin</option>`;
            }
        });

        document.getElementById('staff-login-select').addEventListener('change', (e) => {
            CURRENT_AGENT = e.target.value;
            localStorage.setItem('lasya_agent', CURRENT_AGENT);
            renderAgentWorkspace();
            startLocationTracking();
        });

        // Continuous Geolocation Watch Engine
        function startLocationTracking() {
            if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
            if(!CURRENT_AGENT) { 
                document.getElementById('gps-status-bar').style.display = 'none'; 
                return; 
            }

            document.getElementById('gps-status-bar').style.display = 'block';
            
            gpsWatchId = navigator.geolocation.watchPosition((pos) => {
                update(ref(db, `lasya_locations/${CURRENT_AGENT}`), {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    updatedAt: new Date().toISOString()
                });
            }, (err) => {
                console.warn("GPS Lock pending permission or signal...", err);
            }, {
                enableHighAccuracy: true,
                maximumAge: 10000,
                timeout: 5000
            });
        }

        // Render target active bookings for the logged-in agent (Enlarged Card Contents)
        function renderAgentWorkspace() {
            const banner = document.getElementById('active-user-banner');
            const container = document.getElementById('agent-jobs-container');
            if(!CURRENT_AGENT) {
                banner.innerText = "Session Closed";
                container.innerHTML = `<div class="bg-neutral-800 p-8 rounded-2xl text-center text-sm font-bold uppercase text-neutral-500">Awaiting Login...</div>`;
                return;
            }
            banner.innerText = `Active Session: ${CURRENT_AGENT.toUpperCase()}`;

            onValue(ref(db, 'lasya_bookings'), (snap) => {
                container.innerHTML = "";
                let hasJob = false;
                snap.forEach((child) => {
                    const bKey = child.key;
                    const bData = child.val();
                    if(bData.assignedAgent === CURRENT_AGENT && bData.status === 'assigned') {
                        hasJob = true;
                        container.innerHTML += `
                            <div class="bg-neutral-800 rounded-3xl p-6 border border-neutral-700 space-y-4 shadow-xl">
                                <h3 class="font-black text-lg text-pink-400 uppercase border-b border-neutral-700 pb-2 tracking-wide">${bData.serviceName}</h3>
                                <div class="text-sm space-y-2 text-neutral-200">
                                    <p class="text-base">👩‍🦱 Customer: <span class="text-white font-black">${bData.customerName}</span></p>
                                    <p class="text-base">📞 Phone: <span class="font-mono text-amber-400 font-bold">${bData.customerPhone}</span></p>
                                    <p class="text-neutral-300 bg-neutral-950/40 p-3 rounded-xl italic leading-relaxed mt-2 border border-neutral-800">📍 Address: ${bData.address}</p>
                                </div>
                                <button onclick="triggerPaymentSplitGate('${bKey}', ${bData.finalPrice})" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-black text-sm uppercase py-4 rounded-xl mt-2 shadow-lg tracking-wide transition">
                                    Collect Payment (₹${bData.finalPrice})
                                </button>
                            </div>`;
                    }
                });
                if(!hasJob) {
                    container.innerHTML = `<div class="bg-neutral-800 p-10 rounded-2xl text-center text-sm text-neutral-500 font-bold uppercase tracking-wider border border-neutral-800">No home visits assigned currently</div>`;
                }
            });
        }

        // Handle Payment Modals and UPI Splits
        window.triggerPaymentSplitGate = (id, totalAmount) => {
            const ownerPart = Math.round(totalAmount * 0.60);
            const agentPart = totalAmount - ownerPart;

            document.getElementById('p-total').innerText = `₹${totalAmount}`;
            document.getElementById('p-owner').innerText = `₹${ownerPart}`;
            document.getElementById('p-agent').innerText = `₹${agentPart}`;

            const upiString = `upi://pay?pa=lasyaparlour@okaxis&pn=Lasya%20Owner&am=${totalAmount}&cu=INR&tn=Split_${id}`;
            document.getElementById('qr-box-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(upiString)}`;
            document.getElementById('payment-modal').style.display = 'flex';

            document.getElementById('confirm-payment-settled').onclick = () => {
                update(ref(db, `lasya_bookings/${id}`), { status: "completed_paid" }).then(() => {
                    alert("Job finalized and payment logged successfully!");
                    document.getElementById('payment-modal').style.display = 'none';
                });
            };
        };
    </script>
</body>
</html>
