<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lasya Terminal - Field Agent View</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-neutral-100 font-sans pb-12">

    <header class="bg-neutral-950 p-4 border-b border-neutral-800 flex justify-between items-center">
        <div>
            <h1 class="text-xs font-black text-pink-500 uppercase">Lasya Staff Portal</h1>
            <p id="active-user-banner" class="text-[11px] text-neutral-400 font-bold">Session Closed</p>
        </div>
        <select id="staff-login-select" class="bg-neutral-800 text-white border text-xs font-bold p-1.5 rounded-xl outline-none">
            <option value="">Choose Login Name</option>
            </select>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div id="gps-status-bar" class="hidden text-center text-[10px] font-black uppercase p-2 bg-blue-950 rounded-xl text-blue-400 border border-blue-800">
            📡 Live GPS Tracking Active Engine Online
        </div>
        
        <h2 class="text-xs font-black uppercase text-neutral-400 tracking-wider">Assigned Task Pipeline</h2>
        <div id="agent-jobs-container" class="space-y-4"></div>
    </main>

    <div id="payment-modal" class="fixed inset-0 bg-black/95 z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center text-neutral-900">
            <h3 class="font-black text-base text-purple-900 uppercase">Collect Split Payment</h3>
            <div class="bg-neutral-100 p-3 rounded-2xl inline-block my-3">
                <img id="qr-box-img" src="" class="w-44 h-44 mx-auto object-contain">
            </div>
            <div class="bg-purple-50 p-3 rounded-xl text-left text-xs font-bold space-y-1 text-purple-950 mb-4">
                <div class="flex justify-between"><span>Total Collected:</span><span id="p-total">₹0</span></div>
                <div class="flex justify-between text-pink-600"><span>Owner Share (60%):</span><span id="p-owner">₹0</span></div>
                <div class="flex justify-between text-blue-600"><span>Your Share (40%):</span><span id="p-agent">₹0</span></div>
            </div>
            <button id="confirm-payment-settled" class="w-full bg-green-600 text-white font-black py-3 rounded-xl text-xs uppercase">Complete Assignment</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvBXVAJgqtxC3ErO56qO9Js-fduIlytKM",
            authDomain: "lasya-parlour.firebaseapp.com",
            projectId: "lasya-parlour",
            databaseURL: "https://lasya-parlour-default-rtdb.firebaseio.com",
            storageBucket: "lasya-parlour.firebasestorage.app",
            messagingSenderId: "644324702204",
            appId: "1:644324702204:web:32e0b28a5289e187d62479"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let CURRENT_AGENT = localStorage.getItem('lasya_agent') || "";
        let gpsWatchId = null;

        // Synchronize selector layout options based directly on active db employee files
        onValue(ref(db, 'lasya_staff'), (snap) => {
            const select = document.getElementById('staff-login-select');
            select.innerHTML = `<option value="">Choose Login Name</option>`;
            snap.forEach(child => {
                select.innerHTML += `<option value="${child.key}">${child.key.toUpperCase()}</option>`;
            });
            if(CURRENT_AGENT) { select.value = CURRENT_AGENT; renderAgentWorkspace(); startLocationTracking(); }
        });

        document.getElementById('staff-login-select').addEventListener('change', (e) => {
            CURRENT_AGENT = e.target.value;
            localStorage.setItem('lasya_agent', CURRENT_AGENT);
            renderAgentWorkspace();
            startLocationTracking();
        });

        function startLocationTracking() {
            if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
            if(!CURRENT_AGENT) { document.getElementById('gps-status-bar').style.display = 'none'; return; }

            document.getElementById('gps-status-bar').style.display = 'block';
            
            // Continuous Background GPS Tracking
            gpsWatchId = navigator.geolocation.watchPosition((pos) => {
                update(ref(db, `lasya_locations/${CURRENT_AGENT}`), {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    updatedAt: new Date().toISOString()
                });
            }, (err) => console.log("GPS Lock Pending permission access...", err), {
                enableHighAccuracy: true,
                maximumAge: 10000
            });
        }

        function renderAgentWorkspace() {
            const banner = document.getElementById('active-user-banner');
            const container = document.getElementById('agent-jobs-container');
            if(!CURRENT_AGENT) {
                banner.innerText = "Logged out";
                container.innerHTML = `<div class="bg-neutral-800 p-6 rounded-2xl text-center text-xs font-bold uppercase text-neutral-500">Awaiting Auth...</div>`;
                return;
            }
            banner.innerText = `Active Session: ${CURRENT_AGENT.toUpperCase()}`;

            onValue(ref(db, 'lasya_bookings'), (snap) => {
                container.innerHTML = "";
                let hasJob = false;
                snap.forEach((child) => {
                    const bKey = child.key;
                    const bData = child.val();
                    if(bData.assignedAgent === CURRENT_AGENT && bData.status === 'assigned') {
                        hasJob = true;
                        container.innerHTML += `
                            <div class="bg-neutral-800 rounded-2xl p-4 border border-neutral-700 space-y-3">
                                <h3 class="font-black text-sm text-white uppercase border-b border-neutral-700 pb-1">${bData.serviceName}</h3>
                                <div class="text-xs space-y-1 text-neutral-300">
                                    <p>👩‍🦱 <strong>${bData.customerName}</strong></p>
                                    <p>📞 <span class="font-mono">${bData.customerPhone}</span></p>
                                    <p class="text-neutral-400 italic text-[11px]">📍 Address: ${bData.address}</p>
                                </div>
                                <button onclick="triggerPaymentSplitGate('${bKey}', ${bData.finalPrice})" class="w-full bg-pink-600 text-white font-bold text-xs uppercase py-2.5 rounded-xl mt-2 shadow-lg">Collect Payment (₹${bData.finalPrice})</button>
                            </div>`;
                    }
                });
                if(!hasJob) container.innerHTML = `<div class="bg-neutral-800 p-6 rounded-2xl text-center text-xs text-neutral-500 font-bold uppercase">No visits assigned currently</div>`;
            });
        }

        window.triggerPaymentSplitGate = (id, totalAmount) => {
            const ownerPart = Math.round(totalAmount * 0.60);
            const agentPart = totalAmount - ownerPart;

            document.getElementById('p-total').innerText = `₹${totalAmount}`;
            document.getElementById('p-owner').innerText = `₹${ownerPart}`;
            document.getElementById('p-agent').innerText = `₹${agentPart}`;

            const upiString = `upi://pay?pa=lasyaparlour@okaxis&pn=Lasya%20Owner&am=${totalAmount}&cu=INR&tn=Split_${id}`;
            document.getElementById('qr-box-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiString)}`;
            document.getElementById('payment-modal').style.display = 'flex';

            document.getElementById('confirm-payment-settled').onclick = () => {
                update(ref(db, `lasya_bookings/${id}`), { status: "completed_paid" }).then(() => {
                    alert("Job finalized and split metrics updated across nodes!");
                    document.getElementById('payment-modal').style.display = 'none';
                });
            };
        };
    </script>
</body>
</html>
