<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lasya Control - Management Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 pb-12">

    <header class="bg-purple-950 text-white p-5 border-b-4 border-pink-500 shadow-md">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-xl font-black uppercase tracking-wider">Lasya Parlour Supervisor Hub</h1>
            <p class="text-xs text-pink-300 font-bold">Assign Incoming Home Bookings to Beautician Agents</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        <section class="bg-white rounded-2xl p-6 shadow-sm border">
            <h2 class="font-black text-base uppercase text-slate-900 tracking-tight mb-4 flex items-center gap-2">
                📥 Live On-Demand Incoming Bookings Pipeline
            </h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b bg-slate-100 text-[10px] font-black text-slate-500 uppercase tracking-wider">
                            <th class="p-3">Customer Details</th>
                            <th class="p-3">Requested Service</th>
                            <th class="p-3">Amount</th>
                            <th class="p-3">Status</th>
                            <th class="p-3 text-right">Dispatch & Assign Agent</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-rows">
                        <!-- Dynamic mapping entries -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Integrated exact configurations provided
        const firebaseConfig = {
            apiKey: "AIzaSyAvBXVAJgqtxC3ErO56qO9Js-fduIlytKM",
            authDomain: "lasya-parlour.firebaseapp.com",
            projectId: "lasya-parlour",
            storageBucket: "lasya-parlour.firebasestorage.app",
            messagingSenderId: "644324702204",
            appId: "1:644324702204:web:32e0b28a5289e187d62479",
            measurementId: "G-2CNJY32G85"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const availableAgents = ["agent_ramya", "agent_priya", "agent_anitha"];

        onValue(ref(db, 'lasya_bookings'), (snap) => {
            const tableBody = document.getElementById('bookings-rows');
            tableBody.innerHTML = "";
            
            if(!snap.exists()) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-xs font-bold text-slate-400 uppercase">No active operations pending</td></tr>`;
                return;
            }

            snap.forEach((child) => {
                const bKey = child.key;
                const booking = child.val();

                let selectorBlock = '';
                if(booking.status === 'pending') {
                    selectorBlock = `
                        <select onchange="assignAgent('${bKey}', this.value)" class="p-2 border rounded-xl font-bold bg-amber-50 text-xs border-amber-300 text-amber-900">
                            <option value="">-- Choose Staff --</option>
                            ${availableAgents.map(ag => `<option value="${ag}">${ag.replace('_',' ').toUpperCase()}</option>`).join('')}
                        </select>`;
                } else {
                    selectorBlock = `<span class="text-xs font-mono bg-purple-100 text-purple-800 px-2 py-1 rounded-md font-bold uppercase">${booking.assignedAgent}</span>`;
                }

                let statusBadge = '';
                if(booking.status === 'pending') statusBadge = `<span class="bg-amber-100 text-amber-800 text-[10px] font-black uppercase px-2 py-1 rounded-full">Pending</span>`;
                else if(booking.status === 'assigned') statusBadge = `<span class="bg-blue-100 text-blue-800 text-[10px] font-black uppercase px-2 py-1 rounded-full">En Route</span>`;
                else statusBadge = `<span class="bg-green-100 text-green-800 text-[10px] font-black uppercase px-2 py-1 rounded-full">Paid & Settled</span>`;

                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 text-xs font-medium">
                        <td class="p-3">
                            <div class="font-bold text-slate-900">${booking.customerName}</div>
                            <div class="text-[10px] text-slate-400 font-mono">${booking.customerPhone}</div>
                            <div class="text-[10px] text-slate-500 italic truncate max-w-[180px]">${booking.address}</div>
                        </td>
                        <td class="p-3 font-bold text-purple-950">${booking.serviceName}</td>
                        <td class="p-3 font-bold text-slate-900">₹${booking.finalPrice}</td>
                        <td class="p-3">${statusBadge}</td>
                        <td class="p-3 text-right">${selectorBlock}</td>
                    </tr>`;
            });
        });

        window.assignAgent = (id, agentId) => {
            if(!agentId) return;
            update(ref(db, `lasya_bookings/${id}`), {
                assignedAgent: agentId,
                status: "assigned"
            }).then(() => alert(`Task dispatched smoothly to agent ${agentId.toUpperCase()}!`));
        };
    </script>
</body>
</html>
